<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M13 Metro Arşivi</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#121212;
    color:white;
}


.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:#1e1e1e;
    padding:25px;
    border-right:3px solid #ff4a57;
}


.logo{
    font-size:24px;
    font-weight:bold;
    color:#ff4a57;
    margin-bottom:35px;
}


.menu a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
    margin-bottom:10px;
    border-radius:8px;
    cursor:pointer;
}


.menu a:hover{
    background:#ff4a57;
}



/* Fotoğraf açılır menü */

.station-list{

    display:none;

    margin-left:15px;

    border-left:2px solid #555;

    padding-left:10px;

}


.station-list a{

    font-size:14px;

    padding:10px;

}




.content{
    margin-left:260px;
    padding:40px;
}


.hero{
    background:linear-gradient(135deg,#ff4a57,#8f1d2c);
    padding:50px;
    border-radius:15px;
}


.hero h1{
    font-size:38px;
    margin-bottom:15px;
}


.card-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}


.card{
    background:#1e1e1e;
    padding:25px;
    border-radius:15px;
    border-left:5px solid #ff4a57;
}


.card h2{
    color:#ff4a57;
    margin-bottom:10px;
}


.card p{
    margin-top:8px;
    color:#cccccc;
}


.green{
    color:#9acd9a !important;
}


.gray{
    color:#aaaaaa !important;
}


@media(max-width:800px){

.sidebar{
    position:relative;
    width:100%;
    height:auto;
}

.content{
    margin-left:0;
}

}

</style>

</head>
