<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M13 1.Etap Yenidoğan - Emek Arası Güzergâh</title>


<style>

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body {

    background:#111827;
    color:white;

}


/* Sol Menü */

.sidebar {

    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:#1f2937;
    padding:25px;
    border-right:3px solid #00a6ff;

}


.logo {

    font-size:24px;
    font-weight:bold;
    color:#00a6ff;
    margin-bottom:35px;

}


.menu a {

    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
    margin-bottom:10px;
    border-radius:8px;

}


.menu a:hover {

    background:#00a6ff;
    color:black;

}



/* İçerik */

.content {

    margin-left:260px;
    padding:40px;

}



.box {

    background:#1f2937;
    padding:30px;
    border-radius:15px;
    border-left:5px solid #00a6ff;

}


h1 {

    color:#00a6ff;
    margin-bottom:20px;

}


.route {

    margin-top:25px;
    font-size:20px;

}


.route span {

    color:#00a6ff;

}


img {

    width:100%;
    max-width:900px;
    border-radius:15px;
    margin-top:25px;

}



@media(max-width:800px){

.sidebar {

    position:relative;
    width:100%;
    height:auto;

}


.content {

    margin-left:0;

}

}
